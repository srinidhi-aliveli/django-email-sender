<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
     <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }
body{ 
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(135deg,#8E2DE2,#FF6FD8);
        }

        .container{
            width:500px;
            background:rgba(255,255,255,0.95);
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 50px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            color:#1E3A8A;
            font-size:42px;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }
        label{
            display:block;
            margin:15px 0 6px;
            font-weight:600;
            color:#333;
        }

        input[type=text]{
            width:100%;
            padding:15px;
            border:1px solid #ccc;
            border-radius:12px;
            outline:none;
            font-size:16px;
            transition:0.3s;
        }

        input[type=text]:focus{
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,.3);
        }
        textarea{
            width:100%;
            height:120px;
            padding:15px;
            border:1px solid #ccc;
            border-radius:12px;
            outline:none;
            resize:none;
            font-size:16px;
            transition:0.3s;
        }

        textarea:focus{
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,.3);
        }
        input[type=submit]{
            width:100%;
            margin-top:20px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(90deg,#2563eb,#3b82f6);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            translation:.3s;
        }

        input[type=submit]:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(37,99,235.4);
        }
    </style>
</head>

<body>
    <div class="container">
    <h1>Email Sender</h1>
    <p class="subtitle">Fast . Secure . Reliable</p>
    <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Enter Your Name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Enter Email Subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Share Your Message Here">
        </div>
        <input type="submit" , value="Send Mail">

    </form>
</body>
</html>
